<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pong Game - Ultimate Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 50%, #0a0f2a, #050510);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* جزيئات متحركة في الخلفية */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(78, 205, 196, 0.3);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .game-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 1;
            position: relative;
            transition: all 0.3s ease;
        }

        h1 {
            background: linear-gradient(135deg, #ffd966, #ff9966, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.3rem;
            margin-bottom: 15px;
            letter-spacing: 3px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 10px rgba(255, 217, 102, 0.3); }
            to { text-shadow: 0 0 25px rgba(255, 107, 107, 0.6); }
        }

        /* لوحة النقاط */
        .score-board {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 20px;
        }

        .score-card {
            background: linear-gradient(135deg, rgba(20, 20, 40, 0.9), rgba(0, 0, 0, 0.8));
            padding: 15px 30px;
            border-radius: 80px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 140px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .score-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .score-label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            position: relative;
            z-index: 1;
        }

        .player-label { color: #4ecdc4; }
        .ai-label { color: #ff6b6b; }

        .score-value {
            font-size: 3.5rem;
            font-weight: bold;
            line-height: 1;
            position: relative;
            z-index: 1;
        }

        .player-value { color: #4ecdc4; text-shadow: 0 0 20px #4ecdc4; }
        .ai-value { color: #ff6b6b; text-shadow: 0 0 20px #ff6b6b; }

        /* Canvas */
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(0, 0, 0, 0.3);
            cursor: none;
            width: 100%;
            height: auto;
            max-width: 850px;
            transition: transform 0.1s ease;
        }

        /* خيارات الصعوبة */
        .difficulty-section {
            margin: 20px 0 15px;
        }

        .difficulty-title {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .difficulty-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 8px 25px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 2px solid;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .difficulty-btn.easy {
            border-color: #4ecdc4;
            color: #4ecdc4;
        }

        .difficulty-btn.easy.active {
            background: #4ecdc4;
            color: #fff;
            box-shadow: 0 0 20px #4ecdc4;
        }

        .difficulty-btn.medium {
            border-color: #ffd93d;
            color: #ffd93d;
        }

        .difficulty-btn.medium.active {
            background: #ffd93d;
            color: #000;
            box-shadow: 0 0 20px #ffd93d;
        }

        .difficulty-btn.hard {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .difficulty-btn.hard.active {
            background: #ff6b6b;
            color: #fff;
            box-shadow: 0 0 20px #ff6b6b;
        }

        .difficulty-btn:hover {
            transform: scale(1.05);
        }

        /* أزرار التحكم */
        .controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #2c3e66, #1a1f3a);
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .btn-danger:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.5);
        }

        /* أزرار التحكم العمودية للهاتف */
        .touch-controls-vertical {
            display: none;
            position: fixed;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            justify-content: space-between;
            padding: 0 15px;
            pointer-events: none;
            z-index: 10;
        }

        .touch-btn-vertical {
            pointer-events: auto;
            background: rgba(78, 205, 196, 0.25);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(78, 205, 196, 0.6);
            border-radius: 60px;
            padding: 25px 18px;
            cursor: pointer;
            transition: all 0.1s ease;
            color: #4ecdc4;
            font-weight: bold;
            font-size: 2rem;
            text-align: center;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
        }

        .touch-btn-vertical:active {
            transform: scale(0.92);
            background: rgba(78, 205, 196, 0.5);
            box-shadow: 0 0 30px #4ecdc4;
        }

        .touch-up {
            border-radius: 60px 60px 30px 30px;
        }

        .touch-down {
            border-radius: 30px 30px 60px 60px;
        }

        /* رسالة الفائز */
        .winner-message {
            margin-top: 15px;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 12px;
            border-radius: 60px;
            animation: pulse 0.8s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* شاشة البداية */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a0f2a, #030310);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.6s ease;
        }

        .start-card {
            text-align: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(25px);
            padding: 50px;
            border-radius: 80px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.7s ease;
            max-width: 90%;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .start-card h2 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #ffd966, #ff9966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .start-card p {
            color: #ccc;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .start-btn {
            padding: 18px 55px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        .start-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 35px rgba(78, 205, 196, 0.8);
        }

        .info-text {
            margin-top: 25px;
            color: #888;
            font-size: 0.85rem;
        }

        /* استجابة للهواتف */
        @media (max-width: 768px) {
            .game-container {
                padding: 15px;
                margin: 0 10px;
            }
            
            .score-card {
                padding: 10px 20px;
                min-width: 100px;
            }
            
            .score-value {
                font-size: 2.2rem;
            }
            
            .score-label {
                font-size: 0.7rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .btn {
                padding: 8px 20px;
                font-size: 0.85rem;
            }
            
            .difficulty-btn {
                padding: 6px 18px;
                font-size: 0.8rem;
            }
            
            .touch-controls-vertical {
                display: flex;
            }
            
            .touch-btn-vertical {
                padding: 20px 12px;
                font-size: 1.5rem;
            }
            
            .start-card {
                padding: 30px 20px;
            }
            
            .start-card h2 {
                font-size: 2.2rem;
            }
            
            .start-btn {
                padding: 12px 35px;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .score-board {
                gap: 15px;
            }
            
            .touch-btn-vertical {
                padding: 15px 10px;
                font-size: 1.2rem;
            }
            
            .difficulty-buttons {
                gap: 8px;
            }
            
            .difficulty-btn {
                padding: 5px 12px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

<!-- جزيئات متحركة -->
<div class="particles" id="particles"></div>

<!-- شاشة البداية -->
<div class="start-screen" id="startScreen">
    <div class="start-card">
        <h2>🏓 PONG ELITE</h2>
        <p>واجه الذكاء الاصطناعي في معركة المضارب</p>
        <button class="start-btn" id="startBtn">▶ ابدأ المعركة</button>
        <div class="info-text">
            🖱️ الكمبيوتر: حرك الماوس عمودياً<br>
            📱 الهاتف: استخدم الأزرار الجانبية ▲ ▼<br>
            🎯 أول من يسجل 5 نقاط يفوز
        </div>
    </div>
</div>

<div class="game-container" style="opacity: 0; transition: opacity 0.6s ease;">
    <h1>⚡ PONG BATTLE ⚡</h1>
    
    <div class="score-board">
        <div class="score-card">
            <div class="score-label player-label">👤 اللاعب</div>
            <div class="score-value player-value" id="playerScore">0</div>
        </div>
        <div class="score-card">
            <div class="score-label ai-label">🤖 AI</div>
            <div class="score-value ai-value" id="aiScore">0</div>
        </div>
    </div>

    <canvas id="pongCanvas" width="850" height="550"></canvas>
    
    <!-- اختيار الصعوبة -->
    <div class="difficulty-section">
        <div class="difficulty-title">⚙️ اختر مستوى الذكاء الاصطناعي</div>
        <div class="difficulty-buttons">
            <div class="difficulty-btn easy" data-diff="easy">🌿 سهل</div>
            <div class="difficulty-btn medium active" data-diff="medium">⚡ متوسط</div>
            <div class="difficulty-btn hard" data-diff="hard">🔥 صعب</div>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn btn-primary" id="restartBtn">🔄 إعادة التشغيل</button>
    </div>
    
    <div id="winnerMessage" class="winner-message"></div>
</div>

<!-- أزرار تحكم عمودية للهاتف -->
<div class="touch-controls-vertical">
    <div class="touch-btn-vertical touch-up" id="touchUp">▲</div>
    <div class="touch-btn-vertical touch-down" id="touchDown">▼</div>
</div>

<script>
    // ============= إنشاء جزيئات متحركة =============
    function createParticles() {
        const particlesDiv = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 10 + 10 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.opacity = Math.random() * 0.5;
            particlesDiv.appendChild(particle);
        }
    }
    createParticles();

    // ============= الحصول على العناصر =============
    const startScreen = document.getElementById('startScreen');
    const gameContainer = document.querySelector('.game-container');
    const startBtn = document.getElementById('startBtn');
    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');
    const playerScoreEl = document.getElementById('playerScore');
    const aiScoreEl = document.getElementById('aiScore');
    const restartBtn = document.getElementById('restartBtn');
    const winnerMessageDiv = document.getElementById('winnerMessage');
    const touchUp = document.getElementById('touchUp');
    const touchDown = document.getElementById('touchDown');
    const difficultyBtns = document.querySelectorAll('.difficulty-btn');

    // ============= إعدادات اللعبة =============
    const WINNING_SCORE = 5;
    let gameRunning = true;
    let gameStarted = false;
    let currentDifficulty = 'medium';
    
    // المضارب
    const PADDLE_WIDTH = 12;
    const PADDLE_HEIGHT = 110;
    const BALL_SIZE = 11;
    
    // اللاعب (يمين)
    let playerY = canvas.height / 2 - PADDLE_HEIGHT / 2;
    const playerX = canvas.width - 32;
    
    // AI (يسار)
    let aiY = canvas.height / 2 - PADDLE_HEIGHT / 2;
    const aiX = 20;
    
    // الكرة
    let ballX = canvas.width / 2;
    let ballY = canvas.height / 2;
    let ballDX = 0;
    let ballDY = 0;
    
    // النقاط
    let playerScore = 0;
    let aiScore = 0;
    
    // التحكم باللمس
    let touchDirection = 0;
    
    // ============= إعدادات الصعوبة =============
    function getAISpeed() {
        switch(currentDifficulty) {
            case 'easy': return 3;
            case 'medium': return 4.8;
            case 'hard': return 6.5;
            default: return 4.8;
        }
    }
    
    function getAIError() {
        switch(currentDifficulty) {
            case 'easy': return 0.95;
            case 'medium': return 0.5;
            case 'hard': return 0.15;
            default: return 0.5;
        }
    }
    
    // ============= بدء اللعبة =============
    function startGame() {
        gameStarted = true;
        gameRunning = true;
        startScreen.style.opacity = '0';
        setTimeout(() => {
            startScreen.style.display = 'none';
            gameContainer.style.opacity = '1';
        }, 600);
        resetGame();
        startBall();
    }
    
    function startBall() {
        ballDX = (Math.random() > 0.5 ? 4.5 : -4.5);
        ballDY = (Math.random() * 6) - 3;
        if (Math.abs(ballDY) < 1.5) ballDY = ballDY > 0 ? 2.2 : -2.2;
    }
    
    // ============= التحكم بالماوس =============
    canvas.addEventListener('mousemove', function(e) {
        if (!gameStarted || !gameRunning) return;
        
        const rect = canvas.getBoundingClientRect();
        const scaleY = canvas.height / rect.height;
        let mouseY = (e.clientY - rect.top) * scaleY;
        
        mouseY = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, mouseY));
        playerY = mouseY;
    });
    
    // ============= التحكم باللمس العمودي =============
    function updateTouchMovement() {
        if (!gameStarted || !gameRunning) return;
        
        if (touchDirection === -1) {
            playerY -= 14;
        } else if (touchDirection === 1) {
            playerY += 14;
        }
        
        playerY = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, playerY));
    }
    
    touchUp.addEventListener('touchstart', (e) => {
        e.preventDefault();
        touchDirection = -1;
    });
    touchUp.addEventListener('mousedown', (e) => {
        e.preventDefault();
        touchDirection = -1;
    });
    
    touchDown.addEventListener('touchstart', (e) => {
        e.preventDefault();
        touchDirection = 1;
    });
    touchDown.addEventListener('mousedown', (e) => {
        e.preventDefault();
        touchDirection = 1;
    });
    
    window.addEventListener('touchend', () => { touchDirection = 0; });
    window.addEventListener('mouseup', () => { touchDirection = 0; });
    
    // ============= حركة AI حسب الصعوبة =============
    function moveAI() {
        if (!gameStarted || !gameRunning) return;
        
        const ballCenter = ballY + BALL_SIZE / 2;
        const aiCenter = aiY + PADDLE_HEIGHT / 2;
        const aiSpeed = getAISpeed();
        const errorChance = getAIError();
        
        // إضافة أخطاء حسب الصعوبة
        if (Math.random() > errorChance) {
            if (ballCenter < aiCenter - 12) {
                aiY -= aiSpeed;
            } else if (ballCenter > aiCenter + 12) {
                aiY += aiSpeed;
            }
        } else {
            // خطأ: يتحرك بعكس الاتجاه
            if (ballCenter < aiCenter) {
                aiY += aiSpeed * 0.5;
            } else {
                aiY -= aiSpeed * 0.5;
            }
        }
        
        aiY = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, aiY));
    }
    
    // ============= حركة الكرة =============
    function moveBall() {
        if (!gameStarted || !gameRunning) return;
        
        ballX += ballDX;
        ballY += ballDY;
        
        // اصطدام بالحائط العلوي والسفلي
        if (ballY <= 0) {
            ballY = 0;
            ballDY = -ballDY;
        }
        if (ballY + BALL_SIZE >= canvas.height) {
            ballY = canvas.height - BALL_SIZE;
            ballDY = -ballDY;
        }
        
        // اصطدام بمضرب اللاعب
        if (ballX + BALL_SIZE >= playerX && 
            ballX <= playerX + PADDLE_WIDTH &&
            ballY + BALL_SIZE >= playerY && 
            ballY <= playerY + PADDLE_HEIGHT) {
            
            ballDX = -ballDX;
            let hitPos = (ballY + BALL_SIZE/2) - (playerY + PADDLE_HEIGHT/2);
            hitPos = hitPos / (PADDLE_HEIGHT/2);
            ballDY = hitPos * 5.5;
            ballX = playerX - BALL_SIZE;
            
            canvas.style.transform = 'scale(0.99)';
            setTimeout(() => { canvas.style.transform = ''; }, 50);
        }
        
        // اصطدام بمضرب AI
        if (ballX <= aiX + PADDLE_WIDTH && 
            ballX + BALL_SIZE >= aiX &&
            ballY + BALL_SIZE >= aiY && 
            ballY <= aiY + PADDLE_HEIGHT) {
            
            ballDX = -ballDX;
            let hitPos = (ballY + BALL_SIZE/2) - (aiY + PADDLE_HEIGHT/2);
            hitPos = hitPos / (PADDLE_HEIGHT/2);
            ballDY = hitPos * 5.5;
            ballX = aiX + PADDLE_WIDTH;
        }
        
        // تسجيل النقاط
        if (ballX + BALL_SIZE >= canvas.width) {
            aiScore++;
            updateScores();
            checkWinner();
            if (gameRunning) resetBall();
        } else if (ballX <= 0) {
            playerScore++;
            updateScores();
            checkWinner();
            if (gameRunning) resetBall();
        }
    }
    
    // ============= إعادة تعيين الكرة =============
    function resetBall() {
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
        ballDX = (Math.random() > 0.5 ? 4.5 : -4.5);
        ballDY = (Math.random() * 6) - 3;
        if (Math.abs(ballDY) < 1.5) ballDY = ballDY > 0 ? 2.2 : -2.2;
    }
    
    // ============= تحديث النقاط =============
    function updateScores() {
        playerScoreEl.textContent = playerScore;
        aiScoreEl.textContent = aiScore;
    }
    
    // ============= فحص الفائز =============
    function checkWinner() {
        if (playerScore >= WINNING_SCORE) {
            gameRunning = false;
            winnerMessageDiv.innerHTML = '🏆🎉 البطل! اللاعب انتصر! 🎉🏆';
            winnerMessageDiv.style.background = 'linear-gradient(135deg, #4ecdc4, #2c6e5e)';
            winnerMessageDiv.style.color = '#fff';
        } else if (aiScore >= WINNING_SCORE) {
            gameRunning = false;
            winnerMessageDiv.innerHTML = '🤖💀 الذكاء الاصطناعي انتصر! حاول مرة أخرى 💀🤖';
            winnerMessageDiv.style.background = 'linear-gradient(135deg, #ff6b6b, #c44a4a)';
            winnerMessageDiv.style.color = '#fff';
        }
    }
    
    // ============= إعادة تشغيل اللعبة =============
    function resetGame() {
        gameRunning = true;
        playerScore = 0;
        aiScore = 0;
        playerY = canvas.height / 2 - PADDLE_HEIGHT / 2;
        aiY = canvas.height / 2 - PADDLE_HEIGHT / 2;
        updateScores();
        winnerMessageDiv.innerHTML = '';
        winnerMessageDiv.style.background = '';
        resetBall();
    }
    
    // ============= تغيير الصعوبة =============
    difficultyBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            difficultyBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDifficulty = btn.getAttribute('data-diff');
        });
    });
    
    // ============= رسم اللعبة =============
    function draw() {
        // خلفية متدرجة
        const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, '#0a0a1a');
        gradient.addColorStop(1, '#12122a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // خطوط زخرفية
        ctx.setLineDash([15, 25]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // دائرة وسط متوهجة
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 45, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 217, 61, 0.4)';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 30, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 217, 61, 0.2)';
        ctx.stroke();
        
        ctx.setLineDash([]);
        
        // مضرب AI مع تأثير متدرج
        const aiGradient = ctx.createLinearGradient(aiX, aiY, aiX + PADDLE_WIDTH, aiY + PADDLE_HEIGHT);
        aiGradient.addColorStop(0, '#ff6b6b');
        aiGradient.addColorStop(1, '#ff8e8e');
        ctx.fillStyle = aiGradient;
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#ff6b6b';
        ctx.fillRect(aiX, aiY, PADDLE_WIDTH, PADDLE_HEIGHT);
        
        // مضرب اللاعب
        const playerGradient = ctx.createLinearGradient(playerX, playerY, playerX + PADDLE_WIDTH, playerY + PADDLE_HEIGHT);
        playerGradient.addColorStop(0, '#4ecdc4');
        playerGradient.addColorStop(1, '#6ee7df');
        ctx.fillStyle = playerGradient;
        ctx.shadowColor = '#4ecdc4';
        ctx.fillRect(playerX, playerY, PADDLE_WIDTH, PADDLE_HEIGHT);
        
        // الكرة مع توهج
        ctx.fillStyle = '#ffd93d';
        ctx.shadowBlur = 18;
        ctx.shadowColor = '#ffaa33';
        ctx.fillRect(ballX, ballY, BALL_SIZE, BALL_SIZE);
        
        // إضافة توهج إضافي
        ctx.shadowBlur = 0;
        
        // عرض النقاط على الملعب
        ctx.font = 'bold 32px "Segoe UI", monospace';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.fillText(playerScore, canvas.width - 80, 70);
        ctx.fillText(aiScore, 50, 70);
        
        // عرض مستوى الصعوبة
        ctx.font = '12px monospace';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        let diffText = currentDifficulty === 'easy' ? '🌿 سهل' : (currentDifficulty === 'medium' ? '⚡ متوسط' : '🔥 صعب');
        ctx.fillText(diffText, canvas.width / 2 - 25, 30);
    }
    
    // ============= حلقة اللعبة =============
    function gameLoop() {
        if (gameStarted) {
            updateTouchMovement();
            moveAI();
            moveBall();
        }
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // ============= الأحداث =============
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', () => {
        if (gameStarted) resetGame();
    });
    
    document.querySelectorAll('.touch-btn-vertical').forEach(btn => {
        btn.addEventListener('touchstart', (e) => e.preventDefault());
    });
    
    gameLoop();
</script>
</body>
</html>
